appId: com.everythingagent.app
productName: EverythingAgent
copyright: Copyright © 2026 EverythingAgent

directories:
  buildResources: build
  output: release

files:
  - dist
  - dist-electron

extraResources:
  - from: resources/citydata
    to: citydata
    filter:
      - "**/*"
  - from: build/icon.ico
    to: icon.ico

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icon.ico
  artifactName: ${productName}-${version}-Setup.${ext}
  signAndEditExecutable: false
  requestedExecutionLevel: asInvoker

# 添加应用图标到程序文件
extraFiles:
  - from: build/icon.ico
    to: icon.ico

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: EverythingAgent
  runAfterFinish: true
  # 升级配置 - 自动卸载旧版本
  deleteAppDataOnUninstall: false
  # 允许覆盖安装
  allowElevation: true
  uninstallerIcon: build/icon.ico

asar: true

# pdfjs-dist 需要从 asar 中解包，以便 worker 能正常加载
asarUnpack:
  - "node_modules/pdfjs-dist/**"
